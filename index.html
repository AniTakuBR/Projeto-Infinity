<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YuujiPlay | Site Fora do Ar</title>
  <meta name="description" content="O site YuujiPlay está temporariamente fora do ar. Volte em breve!">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* Importação de fontes */
    @import url('https://fonts.googleapis.com/css2?family=Bungee&display=swap');

    /* Variáveis globais (copiadas do seu site) */
    :root {
      --bg: #0a0b10; /* Fundo escuro */
      --panel: #121425; /* Painéis escuros */
      --panel-2: #17192e; /* Painéis secundários */
      --text: #e6e8ff; /* Texto principal */
      --muted: #9aa0c3; /* Texto secundário */
      --primary: #7c4dff; /* Roxo primário */
      --accent: #00e5ff; /* Ciano */
      --heart: #ff5ca8; /* Rosa (YouTube) */
      --gold: #f9d976; /* Dourado claro */
      --gold-dark: #f39c12; /* Dourado escuro */
      --rose-gold: #e8b7b7; /* Rosa dourado */
      --crimson: #a10000; /* Vermelho escuro */
      --silver: #c0c0c0; /* Prata */
      --progress-fill: linear-gradient(90deg, var(--primary), var(--accent)); /* Gradiente para barras */
      --progress-empty: #2a2a3a; /* Fundo das barras */
    }

    /* Estilos gerais (adaptados do seu site) */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ===== HEADER SIMPLIFICADO ===== */
    header.topbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 20px;
      background: var(--panel);
      border-bottom: 2px solid rgba(0,229,255,0.2);
      position: sticky;
      top: 0;
      z-index: 1000;
      transition: transform 0.3s ease;
    }

    header.topbar:hover {
      transform: translateY(-2px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
    }

    .logo-glow {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse-glow 2s ease-in-out infinite;
    }

    .logo-text {
      font-family: 'Bungee', sans-serif;
      font-size: 1.3rem;
      background: linear-gradient(90deg, var(--accent), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      transition: transform 0.3s ease;
    }

    .logo-text:hover {
      transform: scale(1.05);
    }

    @keyframes pulse-glow {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.2); opacity: 1; }
    }

    /* ===== SEÇÃO PRINCIPAL (MENSAGEM DE FORA DO AR) ===== */
    .offline-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 50px 20px;
      background: linear-gradient(180deg, var(--panel-2), var(--panel));
      position: relative;
      overflow: hidden;
    }

    .offline-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, rgba(0,229,255,0.2), transparent);
      opacity: 0.5;
      z-index: 0;
    }

    .offline-content {
      position: relative;
      z-index: 1;
      max-width: 600px;
    }

    .offline-content h1 {
      font-size: 2.5rem;
      font-family: 'Bungee', sans-serif;
      background: linear-gradient(90deg, var(--accent), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fadeIn 1s ease;
      margin-bottom: 20px;
    }

    .offline-content p {
      font-size: 1.2rem;
      color: var(--muted);
      margin-bottom: 30px;
    }

    .offline-content .cta-buttons {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .offline-content .youtube-cta,
    .offline-content .discord-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 8px;
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .offline-content .youtube-cta {
      background: var(--heart);
    }

    .offline-content .discord-cta {
      background: #5865F2;
    }

    .offline-content .youtube-cta:hover,
    .offline-content .discord-cta:hover {
      transform: translateY(-2px) scale(1.05);
    }

    .offline-content .social-icons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
    }

    .offline-content .social-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-decoration: none;
      font-size: 1.1rem;
      transition: all 0.3s ease;
    }

    .offline-content .social-btn:hover {
      transform: scale(1.15) rotate(5deg);
    }

    .offline-content .social-btn.instagram { background: radial-gradient(circle at 30% 30%, #feda75, #d62976, #962fbf, #4f5bd5); }
    .offline-content .social-btn.twitter { background: #1da1f2; }
    .offline-content .social-btn.facebook { background: #1877f2; }

    /* ===== RODAPÉ ===== */
    footer.footer {
      text-align: center;
      padding: 20px;
      background: var(--panel);
      border-top: 2px solid rgba(0,229,255,0.2);
    }

    footer.footer p {
      font-size: 0.9rem;
      color: var(--muted);
    }

    footer.footer a {
      color: var(--accent);
      text-decoration: none;
      transition: all 0.3s ease;
    }

    footer.footer a:hover {
      text-decoration: underline;
      color: var(--primary);
    }

    /* ===== ANIMAÇÕES (copiadas/adaptadas do seu site) ===== */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsividade básica */
    @media (max-width: 520px) {
      .offline-content h1 {
        font-size: 1.8rem;
      }

      .offline-content p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-row">
    <div class="brand">
      <div class="logo-glow"></div>
      <span class="logo-text">YuujiPlay</span>
    </div>
  </div>
</header>

<section class="offline-section">
  <div class="offline-content">
    <h1>Site Fora do Ar</h1>
    <p>Estamos enfrentando problemas técnicos e o site está temporariamente indisponível. Estamos trabalhando para resolver isso o mais rápido possível. Volte em breve!</p>
    <div class="cta-buttons">
      <a class="youtube-cta" href="https://www.youtube.com/@YuujiPlay" target="_blank" rel="noopener noreferrer">
        <i class="fas fa-heart"></i> Canal do YouTube
      </a>
      <a class="discord-cta" href="https://discord.gg/UmbgRSmaSQ" target="_blank" rel="noopener noreferrer">
        <i class="fab fa-discord"></i> Projeto Infinity
      </a>
    </div>
    <div class="social-icons">
      <a href="https://www.instagram.com/yuujiplay" target="_blank" rel="noopener noreferrer" class="social-btn instagram"><i class="fab fa-instagram"></i></a>
      <a href="https://x.com/YuujiPlay" target="_blank" rel="noopener noreferrer" class="social-btn twitter"><i class="fab fa-twitter"></i></a>
      <a href="https://www.facebook.com/YuujiPlay" target="_blank" rel="noopener noreferrer" class="social-btn facebook"><i class="fab fa-facebook-f"></i></a>
    </div>
  </div>
</section>

<footer class="footer">
  <p>© Todos os direitos reservados a YuujiPlay.</p>
  <p>Versão 0.5.1</p>
</footer>

<script>
  // Nenhum JS específico necessário para esta página simples, mas adicionado um fadeIn no load para matching effects
  document.addEventListener('DOMContentLoaded', () => {
    const content = document.querySelector('.offline-content');
    content.style.opacity = 0;
    content.style.transform = 'translateY(20px)';
    setTimeout(() => {
      content.style.transition = 'opacity 1s ease, transform 1s ease';
      content.style.opacity = 1;
      content.style.transform = 'translateY(0)';
    }, 100);
  });
</script>
</body>
</html>
